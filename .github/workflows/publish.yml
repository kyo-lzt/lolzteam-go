name: Publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Notify Go proxy
        run: |
          MODULE=$(head -1 go.mod | awk '{print $2}')
          TAG=${GITHUB_REF#refs/tags/}
          curl -s "https://proxy.golang.org/${MODULE}/@v/${TAG}.info"
